<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ASU Seat Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      width: 320px;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #ff6b35;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 3px;
      margin-top: 10px;
    }

    input {
      padding: 7px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0f0f23;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #ff6b35; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .add-row input { flex: 1; }

    .add-row button {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      background: #ff6b35;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-row button:hover { background: #e05a25; }
    .add-row button:disabled { background: #555; cursor: default; }

    #term-input, #interval-input { width: 100%; }

    #class-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .class-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1f1f3a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 12px;
      color: #e0e0e0;
    }

    .class-tag button {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 1px;
    }

    .class-tag button:hover { color: #e57373; }
    .class-tag button:disabled { color: #555; cursor: default; }

    #btn {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #btn.start { background: #8b0000; color: #fff; }
    #btn.start:hover { background: #a00000; }
    #btn.stop  { background: #004d00; color: #fff; }
    #btn.stop:hover  { background: #006600; }
    #btn:active { transform: scale(0.98); }

    #check-now {
      margin-top: 6px;
      width: 100%;
      padding: 6px;
      border: 1px solid #333;
      border-radius: 6px;
      background: transparent;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      display: none;
    }
    #check-now:hover { background: #1f1f3a; color: #e0e0e0; }

    #status { margin-top: 14px; display: none; }

    .status-row {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .status-row.active   { background: #0a2a0a; border: 1px solid #1a5a1a; }
    .status-row.inactive { background: #1f1f2e; border: 1px solid #333; }
    .status-row.error    { background: #2a0a0a; border: 1px solid #5a1a1a; }

    .status-row .cls-nbr     { color: #ff6b35; font-weight: 600; }
    .status-row .seats-avail { color: #4caf50; font-weight: 600; }
    .status-row .seats-none  { color: #e57373; }
    .status-row .time-label  { color: #888; font-size: 11px; }

    #error-msg {
      color: #e57373;
      font-size: 11px;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>ASU Class Seat Monitor</h1>

  <label>Add Class Number</label>
  <div class="add-row">
    <input id="classNbr" type="text" maxlength="5" placeholder="e.g. 66145">
    <button id="add-class">Add</button>
  </div>
  <div id="class-list"></div>

  <label for="term-input">Semester Code</label>
  <input id="term-input" type="text" maxlength="4" placeholder="e.g. 2267" />

  <label for="interval-input">Polling Interval (minutes)</label>
  <input id="interval-input" type="number" min="1" max="120" value="5" />

  <div id="error-msg"></div>

  <button id="btn" class="start">Start Monitoring</button>
  <button id="check-now">Check Now</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
